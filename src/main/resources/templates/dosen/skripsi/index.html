<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />

    <title>Data Skripsi</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" th:href="@{/css/sidebar.css}" />

    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
  </head>

  <body>
    <div th:replace="fragments/sidebar-dosen :: sidebar"></div>

    <div class="main-content">
      <div class="topbar">
        <h3>
          <i class="fa-solid fa-book-open"></i>
          Data Skripsi
        </h3>
      </div>

      <div class="card shadow">
        <div
          class="card-header bg-primary text-white d-flex justify-content-between"
        >
          <h5 class="mb-0">Daftar Skripsi Mahasiswa</h5>

          <a href="#" class="btn btn-light btn-sm">
            <i class="fa-solid fa-plus"></i>

            Tambah
          </a>
        </div>

        <div class="card-body">
          <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
              <tr>
                <th>No</th>

                <th>Mahasiswa</th>

                <th>Judul Skripsi</th>

                <th>Status</th>

                <th width="180">Aksi</th>
              </tr>
            </thead>

            <tbody>
              <tr th:each="skripsi, stat : ${skripsiList}">
                <td th:text="${stat.count}"></td>

                <td th:text="${skripsi.mahasiswa.nama}"></td>

                <td th:text="${skripsi.judul}"></td>

                <td>
                  <span class="badge bg-success" th:text="${skripsi.status}">
                  </span>
                </td>

                <td>
                  <a href="#" class="btn btn-primary btn-sm"> Detail </a>

                  <a href="#" class="btn btn-warning btn-sm"> Edit </a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
