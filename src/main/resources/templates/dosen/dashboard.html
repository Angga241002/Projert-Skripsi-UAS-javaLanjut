<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard Dosen</title>

    <link rel="stylesheet" th:href="@{/css/sidebar.css}" />

    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />

    <link rel="stylesheet" th:href="@{/css/responsive.css}" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- Navbar (nanti kita buat) -->
    <!-- <div th:replace="fragments/navbar :: navbar"></div> -->

    <div class="container-fluid">
      <div class="row">
        <!-- Sidebar -->
        <div class="sidebar">
          <div class="sidebar-header">
            <i class="fa-solid fa-graduation-cap"></i>

            <h3>Monitoring<br />Skripsi</h3>
          </div>

          <div class="sidebar-profile">
            <div class="profile-image">
              <i class="fa-solid fa-user"></i>
            </div>

            <h5>Dosen</h5>

            <small>Pembimbing Skripsi</small>
          </div>

          <div class="sidebar-menu">
            <a class="active" th:href="@{/dosen/dashboard}">
              <i class="fa-solid fa-house"></i>
              Dashboard
            </a>

            <a href="#">
              <i class="fa-solid fa-book-open"></i>
              Data Skripsi
            </a>

            <a th:href="@{/dosen/progress}">
              <i class="fa-solid fa-chart-line"></i>
              Monitoring Progress
          </a>

            <a href="#">
              <i class="fa-solid fa-comments"></i>
              Bimbingan
            </a>

            <a href="#">
              <i class="fa-solid fa-file-lines"></i>
              Laporan
            </a>

            <a href="#">
              <i class="fa-solid fa-user"></i>
              Profil
            </a>

            <form th:action="@{/logout}" method="post">
              <button class="btn w-100 text-start sidebar-logout">
                <i class="fa-solid fa-right-from-bracket"></i>

                Logout
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
    </div>

<!-- Main Content -->
<div class="main-content">

    <div class="topbar">

        <h2>Dashboard Dosen</h2>

        <form th:action="@{/logout}" method="post">
            <button class="btn btn-danger">
                Logout
            </button>
        </form>

    </div>

    <div class="row g-4">

        <div class="col-lg-3">

            <div class="card card-stat bg-primary text-white">

                <div class="card-body">

                    <h5>Total Skripsi</h5>

                    <h2 th:text="${totalSkripsi}">0</h2>

                </div>

            </div>

        </div>

        <div class="col-lg-3">

            <div class="card card-stat bg-info text-white">

                <div class="card-body">

                    <h5>Total Progress</h5>

                    <h2 th:text="${totalProgress}">0</h2>

                </div>

            </div>

        </div>

        <div class="col-lg-3">

            <div class="card card-stat bg-success text-white">

                <div class="card-body">

                    <h5>ACC</h5>

                    <h2 th:text="${totalAcc}">0</h2>

                </div>

            </div>

        </div>

        <div class="col-lg-3">

            <div class="card card-stat bg-danger text-white">

                <div class="card-body">

                    <h5>Revisi</h5>

                    <h2 th:text="${totalRevisi}">0</h2>

                </div>

            </div>

        </div>

    </div>

    <br>

    <div class="card shadow-sm">

        <div class="card-body">

            <h4>Progress Berstatus PROSES</h4>

            <h2 th:text="${totalProses}">0</h2>

        </div>

    </div>

</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
  </body>
</html>
