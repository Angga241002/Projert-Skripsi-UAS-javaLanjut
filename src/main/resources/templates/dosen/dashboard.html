<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />

    <title>Dashboard Dosen</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" th:href="@{/css/sidebar.css}" />

    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
  </head>

  <body>
    <div th:replace="fragments/sidebar-dosen :: sidebar"></div>

    <div class="main-content">
      <div class="topbar">
        <h2>Dashboard Dosen</h2>
      </div>

      <div class="row g-4">
        <div class="col-lg-3">
          <div class="card card-stat bg-primary text-white">
            <div class="card-body">
              <h5>Total Skripsi</h5>

              <h2 th:text="${totalSkripsi}"></h2>
            </div>
          </div>
        </div>

        <div class="col-lg-3">
          <div class="card card-stat bg-info text-white">
            <div class="card-body">
              <h5>Total Progress</h5>

              <h2 th:text="${totalProgress}"></h2>
            </div>
          </div>
        </div>

        <div class="col-lg-3">
          <div class="card card-stat bg-success text-white">
            <div class="card-body">
              <h5>ACC</h5>

              <h2 th:text="${totalAcc}"></h2>
            </div>
          </div>
        </div>

        <div class="col-lg-3">
          <div class="card card-stat bg-danger text-white">
            <div class="card-body">
              <h5>Revisi</h5>

              <h2 th:text="${totalRevisi}"></h2>
            </div>
          </div>
        </div>
      </div>

      <br />

      <div class="card">
        <div class="card-body">
          <h4>Progress Berstatus PROSES</h4>

          <h2 th:text="${totalProses}"></h2>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
