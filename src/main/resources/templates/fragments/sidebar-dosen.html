<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <div class="sidebar" th:fragment="sidebar">
      <div class="sidebar-header">
        <i class="fa-solid fa-graduation-cap"></i>

        <h3>
          Monitoring<br />
          Skripsi
        </h3>
      </div>

      <div class="sidebar-profile">
        <div class="profile-image">
          <i class="fa-solid fa-user"></i>
        </div>

        <h5>Dosen</h5>

        <small>Pembimbing Skripsi</small>
      </div>

      <div class="sidebar-menu">
        <a th:href="@{/dosen/dashboard}">
          <i class="fa-solid fa-house"></i>
          Dashboard
        </a>

        <a th:href="@{/dosen/skripsi}">
          <i class="fa-solid fa-book-open"></i>
          Data Skripsi
        </a>

        <a th:href="@{/dosen/progress}">
          <i class="fa-solid fa-chart-line"></i>
          Monitoring Progress
        </a>

        <a th:href="@{/dosen/bimbingan}">
          <i class="fa-solid fa-comments"></i>
          Bimbingan
        </a>

        <a th:href="@{/dosen/laporan}">
          <i class="fa-solid fa-file-lines"></i>
          Laporan
        </a>

        <a th:href="@{/dosen/profil}">
          <i class="fa-solid fa-user"></i>
          Profil
        </a>

        <form th:action="@{/logout}" method="post">
          <button class="btn w-100 text-start sidebar-logout">
            <i class="fa-solid fa-right-from-bracket"></i>

            Logout
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
